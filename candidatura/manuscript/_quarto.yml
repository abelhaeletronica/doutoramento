project:
  type: default
  post-render: python3 center-images.py

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl

    toc: false
    number-sections: false

    fontsize: 11.5pt
    linestretch: 1.3

    geometry:
      - top=3cm
      - bottom=2.5cm
      - left=3cm
      - right=2.5cm

    colorlinks: true
    linkcolor: black
    urlcolor: black
    citecolor: black

    include-in-header:
      - preamble.tex

  docx: default

execute:
  echo: false
