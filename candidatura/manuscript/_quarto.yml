project:
  type: default
  post-render: python3 center-images.py

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl

    toc: false
    number-sections: false

    # --- FONTE PRINCIPAL (corpo do texto) ---
    mainfont: "Libertinus Serif"
    mainfontoptions:
      - Numbers=OldStyle
      - Ligatures=TeX

    # --- FONTE SEM SERIFA (títulos e cabeçalhos) ---
    sansfont: "Inter"
    sansfontoptions:
      - Scale=MatchLowercase

    # --- FONTE DE CÓDIGO ---
    monofont: "JetBrains Mono"
    monofontoptions:
      - Scale=0.85

    # --- TAMANHO DA FONTE PRINCIPAL ---
    fontsize: 11.5pt

    # --- ESPAÇAMENTO ENTRE LINHAS (1.0 = simples, 2.0 = duplo) ---
    linestretch: 1.3

    # --- MARGENS ---
    geometry:
      - top=3cm
      - bottom=2.5cm
      - left=3cm
      - right=2.5cm

    # --- RECUO DE PARÁGRAFO (false = sem recuo) ---
    indent: false

    colorlinks: true
    linkcolor: black
    urlcolor: black
    citecolor: black

    include-in-header:
      - preamble.tex

execute:
  echo: false
